- name: Anovos 
  id: anovos 
  img_src: /assets/img/p_anovos.png 
  description_less: Open source library for feature engineering at scale 
  description_more: > 
    <p>Anovos is an open source library written in pyspark and pandas. It helps feature engineer petabyte scale data at ease on various distributed system platforms like AWS EMR, K8s, Databricks etc. I wrote Anovos-CE, a proprietary edition for fast prototyping by clients based on the original Anovos. Did A/B testing of multiple multiprocessing frameworks like Dask, Ray, Modin, Vaex etc. </p> 
  action_buttons: > 
    <a href="https://github.com/anovos/anovos" target="_blank" class="btn btn-dark mb-1"><i class="fas fa-code-branch"></i> &nbsp Repository</a>
    <a href="https://docs.anovos.ai/" target="_blank" class="btn btn-dark mb-1"><i class="fas fa-align-right"></i> &nbsp Blog Post</a>
  tags: [data-engineering, pyspark, pandas] 

- name: Lendbetter Credit Risk Assessment Platform
  id: lendbetter
  img_src: /assets/img/credit_1.jpeg
  description_less: A fintech platform for assessing credit-worthiness using alternative data at scale.
  description_more: >
    <p>Set up the data engineering pipeline for this fintech API platform using <strong>Spring Boot, Scala-Spark, AWS EMR, NoSQL-DynamoDB</strong> alongside testing tools like <strong>Postman, JMeter</strong> for clients to build finance and location-based alternative data products like adjudging credit-worthiness, targeting ads etc.</p>
  action_buttons: >
    <a href="https://www.mobilewalla.com/lend-better" target="_blank" class="btn btn-dark mb-1"><i class="fas fa-align-right"></i> &nbsp Blog Post</a>
  tags: [data-engineering, scala, spark, emr, nosql, dynamodb]
  
